spring.application.name=api-funcionarios

server.port=8084


spring.datasource.url=jdbc:mysql://${HOST_LF}:3306/funcionarios
spring.datasource.username=${DB_USER_LF}
spring.datasource.password=${DB_PASSWORD_LF}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=90000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-1


# JPA e Hibernat
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


api.departamento-url=http://192.168.10.43:8085


api.funcionario-smc-url=http://192.168.10.43:8083
